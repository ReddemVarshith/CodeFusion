{% extends 'base.html' %}

{% block content %}
<div class="hero" style="min-height: 80vh;">
    <div class="card revelation" style="max-width: 600px; padding: 4rem;">
        <div class="success-icon" style="font-size: 5rem; color: var(--primary); margin-bottom: 2rem;">
            <svg viewBox="0 0 100 100" width="100" height="100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="var(--primary)" stroke-width="5" />
                <path d="M30 50 L45 65 L70 35" fill="none" stroke="var(--primary)" stroke-width="5"
                    stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h2 style="margin-bottom: 1.5rem;">Registration Successful!</h2>
        <p style="color: var(--text-dim); margin-bottom: 2.5rem;">Your team has been successfully registered for
            Fresher's CodeStorm 2k26. We've received your payment proof and will verify it shortly.</p>
        <a href="{% url 'home' %}" class="btn-primary">Back to Home</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    gsap.from(".success-icon svg", {
        scale: 0,
        rotation: -45,
        opacity: 0,
        duration: 1.2,
        ease: "back.out(1.7)"
    });

    gsap.from("h2, p, .btn-primary", {
        y: 20,
        opacity: 0,
        duration: 0.8,
        stagger: 0.2,
        delay: 0.5,
        ease: "power2.out"
    });
</script>
{% endblock %}
