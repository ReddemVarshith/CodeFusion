{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <div class="card" id="registration-card">
        <h2 style="text-align: center; margin-bottom: 2.5rem; color: var(--primary);">CodeFusion Registration</h2>

        <form action="{% url 'register' %}" method="POST" enctype="multipart/form-data" id="registration-form">
            {% csrf_token %}

            <div class="form-group slide-up">
                <label for="team_name">Team Name</label>
                <input type="text" name="team_name" id="team_name" required placeholder="Enter a cool team name">
            </div>

            <div class="form-group slide-up">
                <label for="team_size">Team Size (3-5 members)</label>
                <select name="team_size" id="team_size" required onchange="updateMembers()">
                    <option value="3">3 Members</option>
                    <option value="4">4 Members</option>
                    <option value="5">5 Members</option>
                </select>
            </div>

            <div id="members-container">
                <!-- Dynamic members will be injected here -->
            </div>

            <div class="payment-section card slide-up" style="margin-top: 4rem; border: 1px solid var(--primary);">
                <h3 style="margin-bottom: 1.5rem;">Payment (₹399 Per Head)</h3>
                <p>Total Amount: <span id="total-amount" style="font-weight: bold; color: var(--primary);">₹1,197</span>
                </p>
                <p style="margin: 1rem 0; font-size: 0.9rem;">UPI ID: <strong>9000995454@icici</strong></p>

                <div class="qr-code-container">
                    <img src="/static/images/payment_qr.png" alt="Payment QR Code">
                </div>

                <div class="form-group" style="text-align: left; margin-top: 2rem;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label for="utr_id" style="margin-bottom: 0;">UTR ID</label>
                        <button type="button" id="view-guide-btn"
                            style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s ease;">
                            Where to find UTR ID?
                        </button>
                    </div>
                    <input type="text" name="utr_id" id="utr_id" required placeholder="Enter 12-digit UTR number"
                        maxlength="12" pattern="\d{12}" oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                        title="UTR ID must be exactly 12 digits">

                    <div id="utr-guide"
                        style="display: none; margin-top: 1.5rem; background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 1rem; border: 1px dashed var(--border);">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div style="text-align: center;">
                                <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--secondary);">Google
                                    Pay</p>
                                <img src="/static/images/guides/utr_guide_gpay.png" alt="GPay UTR Guide"
                                    style="width: 100%; border-radius: 8px; border: 1px solid var(--border);">
                            </div>
                            <div style="text-align: center;">
                                <p style="font-size: 0.75rem; margin-bottom: 0.5rem; color: var(--secondary);">PhonePe /
                                    Others</p>
                                <img src="/static/images/guides/utr_guide_phonepe.png" alt="PhonePe UTR Guide"
                                    style="width: 100%; border-radius: 8px; border: 1px solid var(--border);">
                            </div>
                        </div>
                        <button type="button" id="close-guide-btn"
                            style="width: 100%; margin-top: 1rem; background: none; border: none; color: #ff6e6e; font-size: 0.75rem; cursor: pointer; text-decoration: underline;">Close
                            Guide</button>
                    </div>
                </div>

                <div class="form-group" style="text-align: left; margin-top: 1.5rem;">
                    <label for="payment_proof">Upload Payment Proof (Image/PDF)</label>
                    <input type="file" name="payment_proof" id="payment_proof" required accept="image/*,.pdf">
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 3rem; font-size: 1.1rem;">Submit
                Registration</button>
        </form>
    </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}

{% block scripts %}
<script>
    const membersContainer = document.getElementById('members-container');
    const teamSizeSelect = document.getElementById('team_size');
    const totalAmountSpan = document.getElementById('total-amount');

    // Dynamic background update for total amount
    function updateAmount() {
        const size = parseInt(teamSizeSelect.value);
        totalAmountSpan.innerText = `₹${size * 399}`;
    }

    function updateMembers() {
        const size = parseInt(teamSizeSelect.value);
        updateAmount();

        let membersHTML = '';
        for (let i = 1; i <= size; i++) {
            membersHTML += `
                <div class="member-section">
                    <h4 style="margin-bottom: 1rem; color: var(--secondary);">Member ${i} ${i === 1 ? '(Team Lead)' : ''}</h4>
                    <div class="member-card">
                        <div class="details-grid">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" name="member_name_${i}" required placeholder="Name">
                            </div>
                            <div class="form-group">
                                <label>Roll No</label>
                                <input type="text" name="member_roll_${i}" required placeholder="Roll No">
                            </div>
                            <div class="form-group">
                                <label>College Code</label>
                                <input type="text" name="member_cc_${i}" required 
                                    placeholder="College Code"
                                    pattern="[A-Z]+"
                                    oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');"
                                    title="College code must contain only capital letters">
                            </div>
                            <div class="form-group">
                                <label>College Name</label>
                                <input type="text" name="member_college_${i}" required placeholder="College Name">
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" name="member_phone_${i}" required 
                                    placeholder="Phone Number" 
                                    pattern="[6-9][0-9]{9}" 
                                    maxlength="10" 
                                    minlength="10"
                                    oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                                    title="Phone number must be exactly 10 digits and start with 6-9">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" name="member_email_${i}" required placeholder="Email Address">
                            </div>
                            <div class="form-group">
                                <label>T-shirt Size</label>
                                <select name="member_tshirt_${i}" required>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="XXL">XXL</option>
                                    <option value="XXXL">XXXL</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        membersContainer.innerHTML = membersHTML;

        // Animate new elements
        gsap.from(".member-section", {
            y: 20,
            opacity: 0,
            duration: 0.5,
            stagger: 0.05,
            ease: "power2.out"
        });
    }

    // Initial load and preloader coordination
    document.addEventListener('preloaderComplete', () => {
        updateMembers();

        // Entrance animations
        const tl = gsap.timeline();

        tl.fromTo("#registration-card",
            { scale: 0.95, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.8, ease: "power3.out" }
        )
            .fromTo(".slide-up",
                { y: 30, opacity: 0 },
                { y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power2.out" },
                "-=0.4"
            );

        // UTR Guide Toggle
        const viewGuideBtn = document.getElementById('view-guide-btn');
        const closeGuideBtn = document.getElementById('close-guide-btn');
        const utrGuide = document.getElementById('utr_id_guide'); // Wait, I named it utr-guide in HTML, let me check.

        // Wait, I used id="utr-guide" in the previous replacement. 
        // Let me re-check the HTML replacement.
        // Yes, it was id="utr-guide".

        const utrGuideEl = document.getElementById('utr-guide');

        viewGuideBtn.addEventListener('click', () => {
            utrGuideEl.style.display = 'block';
            gsap.fromTo(utrGuideEl,
                { height: 0, opacity: 0, overflow: 'hidden' },
                { height: 'auto', opacity: 1, duration: 0.5, ease: "power2.out" }
            );
            viewGuideBtn.style.display = 'none';
        });

        closeGuideBtn.addEventListener('click', () => {
            gsap.to(utrGuideEl, {
                height: 0,
                opacity: 0,
                duration: 0.4,
                ease: "power2.in",
                onComplete: () => {
                    utrGuideEl.style.display = 'none';
                    viewGuideBtn.style.display = 'block';
                }
            });
        });
    });
</script>
{% endblock %}
